<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Store</title>
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/base.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #FFFFFF;
            color: #111827;
            line-height: 1.6;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        header {
            background-color: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #E5E7EB;
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: #111827;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: opacity 0.2s;
        }

        .logo:hover {
            opacity: 0.7;
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            text-decoration: none;
            color: #4B5563;
            font-weight: 500;
            font-size: 0.9375rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #111827;
        }

        /* Hero Section */
        .hero {
            background: #F9FAFB;
            border-bottom: 1px solid #E5E7EB;
            padding: 4rem 0;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 300;
            color: #111827;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .hero .tagline {
            font-size: 1.25rem;
            color: #4B5563;
            margin-bottom: 0.75rem;
        }

        .hero .description {
            font-size: 1rem;
            max-width: 700px;
            margin: 0 auto;
            color: #6B7280;
        }

        /* Books Section */
        .books-section {
            padding: 4rem 0;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .section-title {
            font-size: 1.875rem;
            font-weight: 300;
            color: #111827;
            letter-spacing: -0.01em;
        }

        .filter-controls {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .filter-button {
            padding: 0.5rem 1rem;
            border: 1px solid #E5E7EB;
            background: #FFFFFF;
            color: #4B5563;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-button:hover {
            background: #F9FAFB;
            border-color: #D1D5DB;
        }

        .filter-button.active {
            background: #111827;
            color: #FFFFFF;
            border-color: #111827;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .book-card {
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 0.75rem;
            overflow: hidden;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .book-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
            border-color: #D1D5DB;
        }

        .book-cover {
            width: 100%;
            height: 360px;
            object-fit: cover;
            background: linear-gradient(135deg, #F3F4F6 0%, #E5E7EB 100%);
        }

        .book-info {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .book-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .book-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background-color: #E5E7EB;
            color: #374151;
        }

        .book-badge.warning {
            background-color: #111827;
            color: #FFFFFF;
        }

        .book-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #111827;
        }

        .book-author {
            color: #6B7280;
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
        }

        .book-description {
            font-size: 0.875rem;
            color: #4B5563;
            margin-bottom: 1rem;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
        }

        .book-price {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            margin-top: auto;
        }

        .current-price {
            font-size: 1.5rem;
            font-weight: 600;
            color: #111827;
        }

        .crypto-price {
            font-size: 0.875rem;
            color: #6B7280;
            font-family: 'Courier New', monospace;
        }

        .cta-button {
            background: #111827;
            color: #FFFFFF;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            transition: background-color 0.2s;
            display: block;
            text-align: center;
            font-size: 1rem;
            font-family: inherit;
        }

        .cta-button:hover {
            background: #374151;
        }

        /* NIP-57 Zap-to-unlock button */
        .zap-button {
            background: #7C3AED;
            color: #FFFFFF;
            border: none;
            padding: 0.625rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
            transition: background-color 0.2s;
            display: block;
            text-align: center;
            font-size: 0.9375rem;
            font-family: inherit;
        }
        .zap-button:hover { background: #6D28D9; }

        /* Zap modal overlay */
        #zap-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        #zap-modal-overlay.open { display: flex; }
        #zap-modal {
            background: #fff;
            border-radius: 1rem;
            padding: 2rem;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        #zap-modal h2 { font-size: 1.25rem; margin-bottom: 0.5rem; }
        #zap-modal p { color: #4B5563; font-size: 0.9375rem; margin-bottom: 1rem; }
        #zap-modal-status { min-height: 1.5rem; font-size: 0.875rem; color: #7C3AED; }
        #zap-modal .close-btn {
            float: right; background: none; border: none; font-size: 1.5rem;
            cursor: pointer; color: #6B7280; line-height: 1;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1rem;
            color: #6B7280;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            font-weight: 300;
            color: #111827;
            margin-bottom: 0.75rem;
        }

        .empty-state p {
            color: #6B7280;
        }

        footer {
            background-color: #F9FAFB;
            border-top: 1px solid #E5E7EB;
            padding: 3rem 0 2rem 0;
            margin-top: 4rem;
            text-align: center;
            color: #6B7280;
            font-size: 0.875rem;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.25rem;
            }

            .books-grid {
                grid-template-columns: 1fr;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
            }

            nav {
                gap: 1rem;
            }
        }

        /* Mobile hamburger nav */
        .hamburger-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: #111827;
            padding: 0.25rem;
            line-height: 1;
        }

        @media (max-width: 639px) {
            .header-content {
                position: relative;
            }

            .hamburger-btn {
                display: block;
            }

            nav {
                display: none;
                flex-direction: column;
                gap: 0;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: rgba(255, 255, 255, 0.98);
                border-bottom: 1px solid #E5E7EB;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
                z-index: 200;
                padding: 0.5rem 0;
            }

            nav.open {
                display: flex;
            }

            nav a,
            nav span {
                display: block;
                padding: 0.75rem 1.5rem;
                border-bottom: 1px solid #F3F4F6;
                font-size: 1rem;
            }

            nav a:last-of-type {
                border-bottom: none;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-content">
                <a href="/brands.html" class="logo">
                    <span id="brand-emoji">📚</span>
                    <span id="brand-logo">Loading...</span>
                </a>
                <button
                    id="mobile-nav-toggle"
                    class="hamburger-btn"
                    aria-label="Toggle navigation"
                    aria-expanded="false"
                    aria-controls="store-nav-links">&#9776;</button>
                <nav id="store-nav-links">
                    <a href="/brands.html">All Networks</a>
                    <a href="/network.html">Search</a>
                    <a href="/revolution.html">Revolution</a>
                    <a href="/cart-custom.html">Cart</a>
                    <span id="nav-auth-placeholder"></span>
                </nav>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h1 id="brand-name">Loading...</h1>
            <p class="tagline" id="brand-tagline"></p>
            <p class="description" id="brand-description"></p>
        </div>
    </section>

    <!-- Books Section -->
    <section class="books-section">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">Catalog</h2>
                <div class="filter-controls" id="filter-controls" style="display: none;">
                    <button class="filter-button active" data-filter="all">All Books</button>
                </div>
            </div>
            <div id="books-grid" class="books-grid">
                <div class="loading">Loading catalog...</div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2024 <span id="footer-brand">Marketplace</span>. Part of the Teneo Network.</p>
        </div>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const BRAND_ID = urlParams.get('brand') || 'teneo';

        // Capture referral code from ?ref= query param and persist to sessionStorage
        // so it survives navigation to the checkout page.
        (function captureReferral() {
            const ref = urlParams.get('ref');
            if (ref) {
                sessionStorage.setItem('referralCode', ref.slice(0, 20).toUpperCase());
            }
        })();

        let brandConfig = null;
        let catalogData = null;

        function encodeHTML(str) {
            return String(str == null ? '' : str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getBookUrl(bookId) {
            const features = brandConfig?.features || {};
            if (features.cryptoOnly) {
                // Crypto-only brands: go straight to crypto checkout
                return `/crypto-checkout.html?book=${encodeURIComponent(bookId)}&brand=${encodeURIComponent(BRAND_ID)}`;
            }
            // All other brands: use the dual checkout page (Stripe + Lightning)
            return `/checkout.html?id=${encodeURIComponent(bookId)}&brand=${encodeURIComponent(BRAND_ID)}`;
        }

        const BRAND_EMOJIS = {
            'teneo': '📘',
            'information_asymmetry': '⚠️',
            'true-earth': '🌍',
            'wealth-wise': '💰'
        };

        async function loadBrandConfig() {
            try {
                const response = await fetch(`/brands/${BRAND_ID}/config.json`);
                brandConfig = await response.json();
                updateBrandInfo(brandConfig);
            } catch (error) {
                console.error('Error loading brand config:', error);
            }
        }

        function updateBrandInfo(config) {
            const brandName = config.name || config.brandName || BRAND_ID;

            document.getElementById('brand-emoji').textContent = BRAND_EMOJIS[BRAND_ID] || '📚';
            document.getElementById('brand-logo').textContent = brandName;
            document.getElementById('brand-name').textContent = brandName;
            document.getElementById('brand-tagline').textContent = config.tagline || '';
            document.getElementById('brand-description').textContent = config.description || '';
            document.getElementById('footer-brand').textContent = brandName;
            document.title = `${brandName} - Book Catalog`;
        }

        async function loadCatalog() {
            try {
                const response = await fetch(`/brands/${BRAND_ID}/catalog.json`);
                catalogData = await response.json();

                displayBooks(catalogData.books || []);
                setupFilters(catalogData);
            } catch (error) {
                console.error('Error loading catalog:', error);
                document.getElementById('books-grid').innerHTML =
                    '<div class="empty-state"><h2>Unable to load catalog</h2><p>Please try again later.</p></div>';
            }
        }

        function setupFilters(catalog) {
            if (!catalog.collections || catalog.collections.length === 0) return;

            const filterControls = document.getElementById('filter-controls');
            filterControls.style.display = 'flex';

            catalog.collections.forEach(collection => {
                const button = document.createElement('button');
                button.className = 'filter-button';
                button.dataset.filter = collection.id;
                button.textContent = collection.name;
                button.addEventListener('click', () => filterBooks(collection.id));
                filterControls.appendChild(button);
            });
        }

        function filterBooks(collectionId) {
            const allBooks = catalogData.books || [];
            const filtered = collectionId === 'all'
                ? allBooks
                : allBooks.filter(book => book.collection === collectionId);

            displayBooks(filtered);

            document.querySelectorAll('.filter-button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === collectionId);
            });
        }

        function displayBooks(books) {
            const grid = document.getElementById('books-grid');

            if (books.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h2>No books available</h2><p>Check back soon for new releases.</p></div>';
                return;
            }

            grid.innerHTML = books.map(book => {
                const badges = [];

                if (book.tier) {
                    badges.push(`<span class="book-badge">Tier ${encodeHTML(book.tier)}</span>`);
                }

                if (book.contentWarnings && book.contentWarnings.length > 0) {
                    badges.push(`<span class="book-badge warning">&#9888;&#65039; ${encodeHTML(book.contentWarnings[0])}</span>`);
                }

                const cryptoPrice = book.priceBTC
                    ? `<span class="crypto-price">&#8383; ${encodeHTML(String(book.priceBTC))}</span>`
                    : book.priceXMR
                    ? `<span class="crypto-price">&#x20BC; ${encodeHTML(String(book.priceXMR))}</span>`
                    : '';

                const coverSrc = book.coverImage
                    ? encodeHTML(book.coverImage)
                    : 'https://via.placeholder.com/400x600/F3F4F6/374151?text=' + encodeURIComponent(book.title);

                return `
                    <a href="${getBookUrl(book.id)}" class="book-card">
                        <img src="${coverSrc}"
                             alt=""
                             class="book-cover"
                             onerror="this.src='https://via.placeholder.com/400x600/F3F4F6/374151?text=Book+Cover'">
                        <div class="book-info">
                            ${badges.length > 0 ? `<div class="book-badges">${badges.join('')}</div>` : ''}
                            <h3 class="book-title">${encodeHTML(book.title)}</h3>
                            <p class="book-author">${encodeHTML(book.author)}</p>
                            <p class="book-description">${encodeHTML(book.description)}</p>
                            <div class="book-price">
                                <span class="current-price">$${encodeHTML(String(book.price))}</span>
                                ${cryptoPrice}
                            </div>
                            <span class="cta-button">${encodeHTML(getBuyButtonText())}</span>
                            ${book.price < 5 ? `<button class="zap-button" onclick="event.preventDefault();event.stopPropagation();openZapModal(${encodeHTML(JSON.stringify(book.id))},${encodeHTML(JSON.stringify(book.title))},${parseFloat(book.price)||0})" type="button">&#9889; Zap to Unlock</button>` : ''}
                        </div>
                    </a>
                `;
            }).join('');
        }

        function getBuyButtonText() {
            if (!brandConfig) return 'View Details';

            const features = brandConfig.features || {};
            if (features.cryptoOnly) return 'Purchase with Crypto';
            return 'View Details';
        }

        function viewBook(bookId) {
            window.location.href = getBookUrl(bookId);
        }

        async function init() {
            await loadBrandConfig();
            await loadCatalog();
        }

        init();
    </script>
    <script>
        // Navbar auth state detection
        (async function updateNavAuth() {
            const placeholder = document.getElementById('nav-auth-placeholder');
            if (!placeholder) return;
            try {
                const resp = await fetch('/api/auth/me');
                if (resp.ok) {
                    placeholder.innerHTML =
                        '<a href="/account-dashboard.html" style="color:inherit;text-decoration:none;">My Account</a>' +
                        ' | <a href="#" id="nav-logout-link" style="color:inherit;text-decoration:none;">Sign out</a>';
                    document.getElementById('nav-logout-link').addEventListener('click', async function(e) {
                        e.preventDefault();
                        await fetch('/api/auth/logout', { method: 'POST' }).catch(()=>{});
                        window.location.reload();
                    });
                } else {
                    placeholder.innerHTML = '<a href="/login.html" style="color:inherit;text-decoration:none;">Sign In</a>';
                }
            } catch (_) {
                placeholder.innerHTML = '<a href="/login.html" style="color:inherit;text-decoration:none;">Sign In</a>';
            }
        })();
    </script>
    <script>
        // Mobile hamburger nav toggle
        (function() {
            const toggle = document.getElementById('mobile-nav-toggle');
            const nav = document.getElementById('store-nav-links');
            if (!toggle || !nav) return;

            toggle.addEventListener('click', function() {
                const isOpen = nav.classList.toggle('open');
                toggle.setAttribute('aria-expanded', String(isOpen));
            });

            // Close nav when a link is clicked on mobile
            nav.addEventListener('click', function(e) {
                if (e.target.tagName === 'A') {
                    nav.classList.remove('open');
                    toggle.setAttribute('aria-expanded', 'false');
                }
            });
        })();
    </script>

    <!-- NIP-57 Zap-to-Unlock modal + flow -->
    <div id="zap-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="zap-modal-title">
        <div id="zap-modal">
            <button class="close-btn" onclick="closeZapModal()" aria-label="Close">&times;</button>
            <h2 id="zap-modal-title">&#9889; Zap to Unlock</h2>
            <p id="zap-modal-desc"></p>
            <div id="zap-modal-status"></div>
        </div>
    </div>
    <script>
    (function() {
        'use strict';

        function setStatus(msg, color) {
            var el = document.getElementById('zap-modal-status');
            if (el) { el.innerHTML = msg; el.style.color = color || '#7C3AED'; }
        }

        window.openZapModal = async function(bookId, bookTitle, priceUsd) {
            var overlay = document.getElementById('zap-modal-overlay');
            var desc = document.getElementById('zap-modal-desc');
            if (!overlay || !desc) return;

            // Build storefront product ID: BRAND_ID:bookId
            var productId = (window.BRAND_ID || 'default') + ':' + bookId;

            desc.textContent = '"' + bookTitle + '" \u2014 $' + priceUsd.toFixed(2);
            setStatus('');
            overlay.classList.add('open');

            // Check for NIP-07 + WebLN support
            if (typeof window.nostr === 'undefined') {
                setStatus('Install a Nostr wallet (e.g. Alby) to use Zap-to-Unlock.', '#DC2626');
                return;
            }
            if (typeof window.webln === 'undefined') {
                setStatus('Install Alby or another WebLN wallet to pay Lightning invoices.', '#DC2626');
                return;
            }

            try {
                setStatus('Fetching product info\u2026');

                // Get product details from storefront API (includes zap_address + price_sats)
                var resp = await fetch('/api/storefront/product/' + encodeURIComponent(productId));
                if (!resp.ok) throw new Error('Product not found in storefront catalog');
                var product = await resp.json();

                if (!product.zap_eligible || !product.zap_address) {
                    setStatus('This product is not zap-eligible. Use the standard checkout.', '#DC2626');
                    return;
                }

                var amountSats = product.price_sats || Math.ceil((product.price / 100) / 30000 * 1e8);
                setStatus('Building zap request for ' + amountSats + ' sats\u2026');

                // Build NIP-57 kind 9734 zap request
                var now = Math.floor(Date.now() / 1000);
                var zapRequest = {
                    kind: 9734,
                    created_at: now,
                    tags: [
                        ['relays', 'wss://relay.damus.io', 'wss://nos.lol'],
                        ['amount', String(amountSats * 1000)], // msats
                        ['lnurl', product.zap_address],
                        ['p', product.metadata && product.metadata.nostr_pubkey ? product.metadata.nostr_pubkey : ''],
                    ],
                    content: 'Zap to unlock: ' + bookTitle,
                };
                var signedZapRequest = await window.nostr.signEvent(zapRequest);

                // Fetch invoice from LNURL endpoint of the store's Lightning Address
                // Lightning Address format: user@domain -> https://domain/.well-known/lnurlp/user
                var parts = product.zap_address.split('@');
                var lnurlBase = parts.length === 2
                    ? 'https://' + parts[1] + '/.well-known/lnurlp/' + parts[0]
                    : product.zap_address;

                setStatus('Requesting invoice from ' + (parts[1] || 'wallet') + '\u2026');
                var lnurlResp = await fetch(
                    lnurlBase + '?amount=' + (amountSats * 1000) +
                    '&nostr=' + encodeURIComponent(JSON.stringify(signedZapRequest))
                );
                if (!lnurlResp.ok) throw new Error('LNURL endpoint returned ' + lnurlResp.status);
                var lnurlData = await lnurlResp.json();

                if (!lnurlData.pr) throw new Error('No payment request from LNURL endpoint');

                setStatus('Paying ' + amountSats + ' sats via Lightning\u2026');

                // Enable WebLN and pay
                await window.webln.enable();
                var payResult = await window.webln.sendPayment(lnurlData.pr);

                setStatus('Payment sent! Waiting for zap receipt\u2026');

                // Poll backend relay subscription for kind 9735 receipt
                var receipt = null;
                var zapRequestEventId = signedZapRequest.id;
                var pollStart = Date.now();
                var pollTimeout = 60000; // 60s total polling window
                while (!receipt && (Date.now() - pollStart) < pollTimeout) {
                    await new Promise(function(r) { setTimeout(r, 3000); });
                    try {
                        var pollResp = await fetch(
                            '/api/zap/receipt?zap_request_id=' + encodeURIComponent(zapRequestEventId)
                        );
                        if (pollResp.ok) {
                            var pollData = await pollResp.json();
                            if (pollData.status === 'found' && pollData.receipt) {
                                receipt = pollData.receipt;
                            }
                        }
                    } catch (_) { /* network blip — keep polling */ }
                }

                if (!receipt) {
                    setStatus('Payment confirmed! Zap receipt not yet published by relay — your download will unlock once the receipt appears. Payment: ' + (payResult.preimage ? payResult.preimage.slice(0, 16) + '\u2026' : 'n/a'), '#D97706');
                } else {
                    // Receipt found — auto-unlock by submitting to zap-unlock endpoint
                    setStatus('Payment detected! Unlocking\u2026', '#059669');
                    var unlockResp = await fetch('/api/storefront/zap-unlock', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            storeSlug: window.BRAND_ID || null,
                            productId: productId,
                            kind9735Event: receipt,
                        }),
                    });
                    if (unlockResp.ok) {
                        var unlockData = await unlockResp.json();
                        if (unlockData.downloadUrl || unlockData.downloadToken) {
                            var dlUrl = unlockData.downloadUrl || ('/api/download/' + unlockData.downloadToken);
                            setStatus('Unlocked! <a href="' + dlUrl + '" style="color:#059669;font-weight:600;">Download now \u2192</a>', '#059669');
                        } else {
                            setStatus('Unlocked! Check your email for the download link.', '#059669');
                        }
                    } else {
                        setStatus('Payment confirmed! Contact support if your download doesn\'t arrive shortly.', '#D97706');
                    }
                }

            } catch (err) {
                setStatus('Error: ' + (err.message || 'Unknown error'), '#DC2626');
                console.error('[zap-unlock]', err);
            }
        };

        window.closeZapModal = function() {
            var overlay = document.getElementById('zap-modal-overlay');
            if (overlay) overlay.classList.remove('open');
        };

        // Close on overlay click
        document.addEventListener('DOMContentLoaded', function() {
            var overlay = document.getElementById('zap-modal-overlay');
            if (overlay) {
                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay) closeZapModal();
                });
            }
        });
    })();
    </script>
</body>
</html>
